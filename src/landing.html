<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Devis BTP</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:    #0d1520;
  --panel: #131f2e;
  --card:  #1a2a3a;
  --border:#1e3048;
  --accent:#1a56a0;
  --accent2:#1d6fa0;
  --text:  #d0e0f0;
  --muted: #4a6a8a;
  --green: #2a7a4a;
  --green2:#1e5a38;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── Header ── */
.app-header {
  padding: 22px 32px 0;
  display: flex;
  align-items: center;
  gap: 14px;
}
.app-logo {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: #fff;
  box-shadow: 0 4px 16px rgba(26,86,160,.4);
}
.app-name { font-size: 22px; font-weight: 700; letter-spacing: .3px; }
.app-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; letter-spacing: .5px; }
.app-version { margin-left: auto; font-size: 10px; color: var(--muted);
               background: var(--panel); border: 1px solid var(--border);
               padding: 3px 10px; border-radius: 10px; }

/* ── Main layout ── */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 0;
  padding: 20px 32px 24px;
  overflow: hidden;
}

/* ── Left — new file actions ── */
.left {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-right: 24px;
  border-right: 1px solid var(--border);
}
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 4px;
}
.new-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: background .15s, border-color .15s, transform .1s;
  text-align: left; color: var(--text);
}
.new-btn:hover {
  background: #1e3050;
  border-color: var(--accent);
  transform: translateY(-1px);
}
.new-btn .btn-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.new-btn.dqe .btn-icon { background: rgba(26,86,160,.25); color: #7aacff; }
.new-btn.bpu .btn-icon { background: rgba(42,122,74,.25);  color: #7adda0; }
.new-btn .btn-text strong { display: block; font-size: 13px; font-weight: 600; }
.new-btn .btn-text span   { font-size: 11px; color: var(--muted); }

.open-btn {
  margin-top: 6px;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  color: var(--muted);
  font-size: 12px;
  transition: border-color .15s, color .15s;
}
.open-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Right — recent files ── */
.right {
  padding-left: 24px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.recents-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-right: 4px;
}
.recents-list::-webkit-scrollbar { width: 4px; }
.recents-list::-webkit-scrollbar-track { background: transparent; }
.recents-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.recent-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  transition: background .12s, border-color .12s;
  position: relative;
}
.recent-item:hover { background: #1e3050; border-color: #2a4a6a; }
.recent-icon { font-size: 20px; flex-shrink: 0; color: #4a90d9; }
.recent-info { flex: 1; min-width: 0; }
.recent-name {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.recent-path {
  font-size: 10px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 2px;
}
.recent-remove {
  display: none;
  background: none; border: none;
  color: var(--muted); cursor: pointer; font-size: 13px;
  padding: 4px; border-radius: 4px; flex-shrink: 0;
  transition: color .12s;
}
.recent-item:hover .recent-remove { display: block; }
.recent-remove:hover { color: #ff6b6b; }
.no-recents {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--muted); gap: 10px;
}
.no-recents i { font-size: 36px; opacity: .3; }
.no-recents p { font-size: 12px; opacity: .6; }

/* ── Footer ── */
.footer {
  padding: 12px 32px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; color: var(--muted);
}
.footer a { color: var(--muted); text-decoration: none; }
.footer a:hover { color: var(--text); }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo"><i class="bi bi-file-earmark-text"></i></div>
  <div>
    <div class="app-name">Devis BTP</div>
    <div class="app-sub">DQE / BPU — Dinar Algérien</div>
  </div>
  <span class="app-version">v1.0.0</span>
</div>

<div class="main">

  <!-- Left: New / Open -->
  <div class="left">
    <div class="section-label">Nouveau projet</div>

    <button class="new-btn dqe" onclick="landingAPI.newFile('DQE')">
      <div class="btn-icon"><i class="bi bi-table"></i></div>
      <div class="btn-text">
        <strong>Nouveau DQE</strong>
        <span>Détail Quantitatif Estimatif</span>
      </div>
    </button>

    <button class="new-btn bpu" onclick="landingAPI.newFile('BPU')">
      <div class="btn-icon"><i class="bi bi-list-columns"></i></div>
      <div class="btn-text">
        <strong>Nouveau BPU</strong>
        <span>Bordereau des Prix Unitaires</span>
      </div>
    </button>

    <button class="open-btn" onclick="landingAPI.openFile()">
      <i class="bi bi-folder2-open"></i>
      <span>Ouvrir un fichier existant…</span>
    </button>

    <div style="flex:1"></div>

    <div style="font-size:10px;color:var(--muted);line-height:1.6;">
      <i class="bi bi-info-circle me-1"></i>
      Formats supportés : <strong>.devis</strong>, .json
    </div>
  </div>

  <!-- Right: Recent files -->
  <div class="right">
    <div class="section-label" style="margin-bottom:10px">Fichiers récents</div>
    <div class="recents-list" id="recents-list">
      <div class="no-recents">
        <i class="bi bi-clock-history"></i>
        <p>Aucun fichier récent</p>
      </div>
    </div>
  </div>

</div>

<div class="footer">
  <i class="bi bi-github"></i>
  <a href="#" onclick="openGithub()">blackscreamer/DEVIS-APP</a>
  <span style="margin-left:auto">Appuyez sur Entrée pour ouvrir un fichier</span>
</div>

<script>
function openGithub() {
  // shell.openExternal via main
  if (window.landingAPI && window.landingAPI.openExternal)
    window.landingAPI.openExternal('https://github.com/blackscreamer/DEVIS-APP');
}

function renderRecents(list) {
  const container = document.getElementById('recents-list');
  if (!list || !list.length) {
    container.innerHTML = `
      <div class="no-recents">
        <i class="bi bi-clock-history"></i>
        <p>Aucun fichier récent</p>
      </div>`;
    return;
  }
  container.innerHTML = list.map(fp => {
    const name = fp.split(/[\\/]/).pop().replace(/\.(devis|json)$/, '');
    const dir  = fp.split(/[\\/]/).slice(0,-1).join('/');
    return `<div class="recent-item" onclick="openRecent('${fp.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      <i class="bi bi-file-earmark-text-fill recent-icon"></i>
      <div class="recent-info">
        <div class="recent-name">${name}</div>
        <div class="recent-path">${dir}</div>
      </div>
      <button class="recent-remove" title="Retirer de la liste"
        onclick="removeRecent(event,'${fp.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
        <i class="bi bi-x"></i>
      </button>
    </div>`;
  }).join('');
}

function openRecent(fp) {
  if (window.landingAPI) window.landingAPI.openRecent(fp);
}

async function removeRecent(e, fp) {
  e.stopPropagation();
  if (window.landingAPI) {
    const list = await window.landingAPI.removeRecent(fp);
    renderRecents(list);
  }
}

// Receive recents from main process
if (window.landingAPI) {
  window.landingAPI.onRecentsUpdated(renderRecents);
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.landingAPI && window.landingAPI.openFile();
  if (e.key === 'n' && !e.ctrlKey) window.landingAPI && window.landingAPI.newFile('DQE');
});
</script>
</body>
</html>
